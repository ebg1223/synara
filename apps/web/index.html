<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 stops mobile Safari's auto-zoom when focusing the composer
         (any editable with a font-size under 16px triggers it). iOS still honors
         manual pinch-zoom despite maximum-scale, so this is not an a11y regression.
         interactive-widget=resizes-content makes Android Chrome shrink the layout
         viewport when the keyboard opens so h-dvh shells keep the composer visible
         instead of letting the keyboard cover it. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, interactive-widget=resizes-content"
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fcfcfc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0e0e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Non-translucent status bar: the OS keeps the webview below the status bar,
         so the app's 46px top bar never hides under the notch. black-translucent
         would require safe-area padding across every chrome surface. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Synara" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Synara</title>
    <style>
      /* Boot splash — shown while the JS bundle is parsing and React mounts.
         React's createRoot(...).render(...) wipes #root's children, so no teardown needed. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        /* Prevent a white flash before the app's own styles load. */
        color-scheme: light dark;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      .app-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
        pointer-events: none;
      }
      .app-boot-splash__icon {
        width: 112px;
        height: 112px;
        opacity: 0;
        transform: scale(0.96);
        animation:
          app-boot-splash-in 420ms ease-out forwards,
          app-boot-splash-pulse 2.4s ease-in-out 420ms infinite;
      }
      @keyframes app-boot-splash-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes app-boot-splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.98);
          opacity: 0.85;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot-splash__icon {
          animation: app-boot-splash-in 200ms ease-out forwards;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-splash" aria-hidden="true">
        <img class="app-boot-splash__icon" src="/synara-logo.svg" alt="" draggable="false" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
